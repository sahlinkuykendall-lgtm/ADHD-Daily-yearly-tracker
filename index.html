<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#E4ECE6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="On Track">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%234A7A52'/%3E%3Cpath d='M28 52 L44 68 L74 34' stroke='white' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%234A7A52'/%3E%3Cpath d='M28 52 L44 68 L74 34' stroke='white' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<title>On Track</title>
<style>
  :root{
    --surface:#FFFFFF;
    --surface-2:#F1F5F0;
    --ink:#252B22;
    --muted:#76806F;
    --line:#E2E8DE;
    --green:#4A7A52;
    --green-d:#3C6543;
    --green-soft:#DCEADD;
    --amber:#BE7233;
    --amber-soft:#FBEBD8;
    --radius:20px;
    --h1:120; --h2:160;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    color:var(--ink);
    min-height:100vh;min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    background:#E4ECE6;
  }
  /* living background */
  #bg{
    position:fixed;inset:-10% -10% -10% -10%;z-index:-2;
    background:
      radial-gradient(120% 90% at 15% 0%, hsl(var(--h1) 48% 92%) 0%, transparent 60%),
      radial-gradient(120% 90% at 85% 100%, hsl(var(--h2) 44% 90%) 0%, transparent 60%),
      linear-gradient(160deg, hsl(var(--h1) 40% 91%), hsl(var(--h2) 38% 88%));
    transition:background .25s linear;
  }
  #bg::after{
    content:"";position:absolute;inset:0;
    background:radial-gradient(140% 70% at 50% -10%, #ffffff55, transparent 55%);
  }

  .app{
    max-width:560px;margin:0 auto;
    padding:max(16px,env(safe-area-inset-top)) 16px calc(122px + env(safe-area-inset-bottom));
    min-height:100dvh;
  }

  /* hero header card */
  .hero{
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid #ffffff90;
    border-radius:24px;padding:18px 18px 16px;margin-bottom:14px;
    box-shadow:0 8px 24px #2a36221a;
  }
  .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .greeting{font-size:1.6rem;font-weight:800;letter-spacing:-.02em;line-height:1.05;}
  .date{font-size:.92rem;color:var(--muted);font-weight:700;margin-top:3px;}
  .manage-btn{
    appearance:none;border:none;background:#ffffffcc;color:var(--muted);
    width:40px;height:40px;border-radius:13px;font-size:.82rem;font-weight:800;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex:none;
    box-shadow:0 1px 3px #0000000f;transition:transform .15s,background .2s,color .2s;
  }
  .manage-btn:active{transform:scale(.92);}
  .manage-btn.on{background:var(--green);color:#fff;}
  .streak{
    display:flex;align-items:center;gap:10px;margin-top:14px;
    background:linear-gradient(100deg,#FFF2E0,#FFE8D2);
    border-radius:15px;padding:11px 14px;
  }
  .streak.cold{background:var(--surface-2);}
  .streak .flame{font-size:1.5rem;line-height:1;flex:none;filter:drop-shadow(0 1px 2px #d97a2e55);}
  .streak.cold .flame{filter:grayscale(1);opacity:.45;}
  .streak .stxt{font-weight:800;font-size:1rem;}
  .streak .ssub{font-weight:700;font-size:.8rem;color:var(--muted);margin-top:1px;}

  /* attention strip */
  .attention{
    background:rgba(251,235,216,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid #ffffff70;border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;
    display:none;animation:drop .35s ease both;box-shadow:0 6px 18px #b572331a;
  }
  .attention.show{display:block;}
  .attention h2{margin:0 0 8px;font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);}
  .att-item{display:flex;align-items:center;gap:9px;padding:6px 0;font-weight:700;font-size:.96rem;cursor:pointer;}
  .att-item .pill{font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;background:#fff;color:var(--amber);padding:3px 9px;border-radius:20px;flex:none;}
  .att-item .emj{font-size:1.05rem;flex:none;}

  /* tabs */
  .tabs{
    display:flex;position:relative;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);border-radius:17px;padding:5px;gap:4px;margin-bottom:16px;
    box-shadow:0 4px 14px #2a36220f;border:1px solid #ffffff80;
  }
  .tab{flex:1;z-index:1;appearance:none;border:none;background:transparent;color:var(--muted);
    font-family:inherit;font-weight:800;font-size:.9rem;padding:11px 2px;border-radius:12px;cursor:pointer;
    transition:color .2s;letter-spacing:-.01em;}
  .tab .count{display:inline-block;min-width:17px;margin-left:5px;font-size:.68rem;font-weight:800;
    background:var(--green-soft);color:var(--green-d);border-radius:20px;padding:1px 5px;vertical-align:middle;transition:opacity .2s;}
  .tab .count.zero{opacity:0;}
  .tab.active{color:var(--ink);}
  .tab-bg{position:absolute;top:5px;height:calc(100% - 10px);background:#fff;border-radius:12px;
    transition:transform .28s cubic-bezier(.34,1.3,.5,1),width .28s;z-index:0;box-shadow:0 2px 6px #2a362218;}

  /* progress */
  .progress-wrap{margin-bottom:14px;padding:0 4px;}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
  .progress-label{font-size:.92rem;font-weight:800;color:var(--ink);}
  .progress-num{font-size:.88rem;font-weight:800;color:var(--green-d);}
  .bar{height:10px;background:#ffffffb0;border-radius:20px;overflow:hidden;box-shadow:inset 0 1px 2px #0000000d;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--green),#5C9466);border-radius:20px;width:0%;
    transition:width .5s cubic-bezier(.4,0,.2,1);}

  /* list */
  .list{display:flex;flex-direction:column;gap:10px;}
  .task{
    display:flex;align-items:center;gap:14px;background:var(--surface);
    border-radius:var(--radius);padding:17px 16px;cursor:pointer;user-select:none;
    box-shadow:0 3px 10px #2a36220f;border:1px solid #ffffff;
    transition:transform .12s,opacity .3s,background .25s,box-shadow .25s;
  }
  .task:active{transform:scale(.985);}
  .check{width:29px;height:29px;border-radius:10px;border:2.5px solid var(--line);flex:none;
    display:flex;align-items:center;justify-content:center;position:relative;
    transition:background .25s,border-color .25s,transform .25s;}
  .check svg{width:18px;height:18px;}
  .check path{stroke:#fff;stroke-width:3.5;fill:none;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:30;stroke-dashoffset:30;transition:stroke-dashoffset .3s ease .05s;}
  .task .emj{font-size:1.3rem;flex:none;line-height:1;}
  .label{font-weight:700;font-size:1.06rem;flex:1;transition:color .3s;letter-spacing:-.01em;}
  .task.done{background:var(--surface-2);box-shadow:0 1px 4px #2a36220a;}
  .task.done .check{background:var(--green);border-color:var(--green);}
  .task.done .check path{stroke-dashoffset:0;}
  .task.done .label{color:var(--muted);text-decoration:line-through;text-decoration-color:#b6c0b0;}
  .task.done .emj{filter:grayscale(.6);opacity:.55;}
  .task.pop{animation:pop .32s ease;}
  @keyframes pop{40%{transform:scale(1.028);}100%{transform:scale(1);}}

  .del{width:31px;height:31px;border-radius:50%;border:none;background:#F2DBD6;color:#B5503F;
    font-size:1rem;font-weight:800;flex:none;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;}
  body.managing .del{display:flex;}
  body.managing .check{opacity:.35;}
  body.managing .task{cursor:default;}

  .alldone{text-align:center;padding:26px 20px;color:var(--muted);font-weight:700;animation:drop .4s ease both;
    background:rgba(255,255,255,.5);border-radius:var(--radius);}
  .alldone .big{font-size:2.5rem;margin-bottom:8px;}
  .alldone .sub{font-size:1rem;}

  .add-fab{position:fixed;right:max(18px,calc(50% - 280px + 18px));bottom:calc(24px + env(safe-area-inset-bottom));
    width:62px;height:62px;border-radius:21px;border:none;background:var(--green);color:#fff;font-size:2rem;
    font-weight:300;line-height:1;cursor:pointer;z-index:30;box-shadow:0 8px 22px #4a7a5255;
    display:flex;align-items:center;justify-content:center;transition:transform .18s;}
  .add-fab:active{transform:scale(.9) rotate(90deg);}

  .scrim{position:fixed;inset:0;background:#2a302699;opacity:0;pointer-events:none;transition:opacity .3s;z-index:40;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-radius:28px 28px 0 0;
    padding:20px 20px calc(26px + env(safe-area-inset-bottom));z-index:41;transform:translateY(110%);
    transition:transform .34s cubic-bezier(.34,1.1,.5,1);max-width:560px;margin:0 auto;max-height:82dvh;overflow-y:auto;
    box-shadow:0 -10px 40px #2a362230;}
  .sheet.show{transform:translateY(0);}
  .grab{width:42px;height:5px;background:var(--line);border-radius:10px;margin:0 auto 16px;}
  .sheet h3{margin:0 0 4px;font-size:1.22rem;font-weight:800;}
  .sheet .sub{margin:0 0 16px;color:var(--muted);font-weight:700;font-size:.9rem;}
  .chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px;}
  .chip{appearance:none;border:1.5px solid var(--line);background:var(--surface-2);color:var(--ink);
    font-family:inherit;font-weight:700;font-size:.95rem;padding:11px 15px;border-radius:14px;cursor:pointer;
    transition:transform .12s,background .15s;}
  .chip:active{transform:scale(.92);background:var(--green-soft);}
  .custom-row{display:flex;gap:9px;}
  .custom-row input{flex:1;font-family:inherit;font-size:1rem;font-weight:600;padding:13px 15px;
    border:1.5px solid var(--line);border-radius:14px;background:var(--surface-2);color:var(--ink);outline:none;min-width:0;}
  .custom-row input:focus{border-color:var(--green);}
  .custom-row button{appearance:none;border:none;background:var(--green);color:#fff;font-family:inherit;
    font-weight:800;font-size:1rem;padding:0 20px;border-radius:14px;cursor:pointer;flex:none;}
  .custom-row button:active{transform:scale(.95);}

  @keyframes drop{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>
<div id="bg"></div>
<div class="app">
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="greeting" id="greeting">Hey</div>
        <div class="date" id="date"></div>
      </div>
      <button class="manage-btn" id="manageBtn" aria-label="Manage tasks">✎</button>
    </div>
    <div class="streak cold" id="streak">
      <span class="flame">🔥</span>
      <div>
        <div class="stxt" id="streakTxt">Start your streak</div>
        <div class="ssub" id="streakSub">Finish today's list to begin</div>
      </div>
    </div>
  </div>

  <section class="attention" id="attention">
    <h2>Needs attention</h2>
    <div id="attList"></div>
  </section>

  <div class="tabs" id="tabs">
    <div class="tab-bg" id="tabBg"></div>
    <button class="tab active" data-p="today">Today<span class="count" id="c-today"></span></button>
    <button class="tab" data-p="week">Week<span class="count" id="c-week"></span></button>
    <button class="tab" data-p="month">Month<span class="count" id="c-month"></span></button>
    <button class="tab" data-p="year">Year<span class="count" id="c-year"></span></button>
  </div>

  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label" id="progLabel">Today</span>
      <span class="progress-num" id="progNum">0 / 0</span>
    </div>
    <div class="bar"><div class="bar-fill" id="barFill"></div></div>
  </div>

  <div class="list" id="list"></div>
</div>

<button class="add-fab" id="addFab" aria-label="Add a task">+</button>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <h3 id="sheetTitle">Add to today</h3>
  <p class="sub">Tap one to add it — no typing needed.</p>
  <div class="chips" id="chips"></div>
  <div class="custom-row">
    <input type="text" id="customInput" placeholder="Or type your own…" maxlength="40" autocomplete="off">
    <button id="customAdd">Add</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  var KEY="ontrack-v1";

  var DEFAULTS={
    today:[{e:"💧",t:"Drink water"},{e:"🪥",t:"Brush teeth"},{e:"🏋️",t:"Work out"},{e:"💊",t:"Take meds / vitamins"},{e:"🍽️",t:"Eat a real meal"},{e:"🧹",t:"Tidy up 10 min"},{e:"🌙",t:"Wind down for bed"}],
    week:[{e:"🛒",t:"Grocery run"},{e:"🧺",t:"Laundry"},{e:"🧽",t:"Clean the house"},{e:"💵",t:"Review finances"},{e:"🗓️",t:"Plan the week"},{e:"📞",t:"Check in with someone"}],
    month:[{e:"🧾",t:"Pay bills"},{e:"🚗",t:"Check car / oil"},{e:"🎯",t:"Review goals"},{e:"🧼",t:"Deep clean"},{e:"💳",t:"Budget review"}],
    year:[{e:"🦷",t:"Dentist"},{e:"🩺",t:"Doctor checkup"},{e:"🪪",t:"Renew registrations"},{e:"🛡️",t:"Review insurance"},{e:"📋",t:"Taxes"}]
  };
  var CHIPS={
    today:[["💧","Water"],["🧘","Meditate"],["📖","Read"],["🚶","Walk"],["🤸","Stretch"],["✍️","Journal"],["☀️","Sunlight"],["🦷","Floss"],["🛏️","Make bed"],["🧴","Skincare"]],
    week:[["🍱","Meal prep"],["🗑️","Take trash out"],["🪴","Water plants"],["💪","Gym x3"],["❤️","Date night"],["🌿","Yardwork"]],
    month:[["💇","Haircut"],["📱","Back up phone"],["🔁","Check subscriptions"],["🥫","Restock pantry"],["🧯","Test detectors"]],
    year:[["👁️","Eye exam"],["🛂","Passport check"],["📑","Gather tax docs"],["🎂","Birthday list"],["🩹","First-aid restock"]]
  };
  var PERIODS=["today","week","month","year"];
  var LABELS={today:"Today",week:"This week",month:"This month",year:"This year"};
  var SHORT={today:"today",week:"this week",month:"this month",year:"this year"};
  var state=null,current="today";

  function pad(n){return n<10?"0"+n:""+n;}
  function dayKey(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
  function weekKey(d){var s=new Date(d);s.setHours(0,0,0,0);s.setDate(s.getDate()-s.getDay());return "W"+dayKey(s);}
  function monthKey(d){return d.getFullYear()+"-"+pad(d.getMonth()+1);}
  function yearKey(d){return ""+d.getFullYear();}
  function keyFor(p,d){return p==="today"?dayKey(d):p==="week"?weekKey(d):p==="month"?monthKey(d):yearKey(d);}
  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
  function freshPeriod(p,d){return {tasks:DEFAULTS[p].map(function(o){return {id:uid(),e:o.e,t:o.t};}),done:{},key:keyFor(p,d)};}

  function load(){
    var raw=null;try{raw=localStorage.getItem(KEY);}catch(e){}
    var now=new Date();
    if(!raw){state={meta:{streak:0,lastDone:null}};PERIODS.forEach(function(p){state[p]=freshPeriod(p,now);});save();return;}
    try{state=JSON.parse(raw);}catch(e){state={meta:{streak:0,lastDone:null}};PERIODS.forEach(function(p){state[p]=freshPeriod(p,now);});}
    if(!state.meta)state.meta={streak:0,lastDone:null};
    PERIODS.forEach(function(p){if(!state[p])state[p]=freshPeriod(p,now);});
  }
  function rollover(){var now=new Date(),ch=false;PERIODS.forEach(function(p){var k=keyFor(p,now);if(state[p].key!==k){state[p].done={};state[p].key=k;ch=true;}});if(ch)save();}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

  function remaining(p){var s=state[p];return s.tasks.filter(function(t){return !s.done[t.id];}).length;}
  function sortedTasks(p){var s=state[p];return s.tasks.slice().sort(function(a,b){return (s.done[a.id]?1:0)-(s.done[b.id]?1:0);});}

  /* streak */
  function updateStreak(){
    var s=state.today;if(s.tasks.length===0)return;
    if(remaining("today")!==0)return; // only count a fully finished day
    var now=new Date(),today=dayKey(now);
    if(state.meta.lastDone===today)return;
    var y=new Date(now);y.setDate(y.getDate()-1);
    state.meta.streak=(state.meta.lastDone===dayKey(y))?(state.meta.streak+1):1;
    state.meta.lastDone=today;save();
  }
  function activeStreak(){
    var now=new Date(),today=dayKey(now);var y=new Date(now);y.setDate(y.getDate()-1);
    if(state.meta.lastDone===today||state.meta.lastDone===dayKey(y))return state.meta.streak;
    return 0;
  }
  function renderStreak(){
    var n=activeStreak();var box=document.getElementById("streak");
    var done=remaining("today")===0&&state.today.tasks.length>0;
    if(n>0){
      box.classList.remove("cold");
      document.getElementById("streakTxt").textContent=n+(n===1?" day streak":" day streak")+(done?" 🎉":"");
      document.getElementById("streakSub").textContent=done?"Crushed today. Keep it rolling.":"Finish today's list to keep it alive";
    }else{
      box.classList.add("cold");
      document.getElementById("streakTxt").textContent="Start your streak";
      document.getElementById("streakSub").textContent="Finish today's list to begin";
    }
  }

  var listEl=document.getElementById("list");
  function render(){renderList();renderProgress();renderCounts();renderAttention();renderStreak();}

  function renderList(){
    var s=state[current];listEl.innerHTML="";
    var tasks=sortedTasks(current);
    if(tasks.length===0){listEl.innerHTML='<div class="alldone"><div class="big">🌱</div><div class="sub">No tasks here yet. Tap + to add one.</div></div>';return;}
    var allDone=remaining(current)===0;
    tasks.forEach(function(t){
      var done=!!s.done[t.id];
      var row=document.createElement("div");
      row.className="task"+(done?" done":"");
      row.innerHTML='<div class="check"><svg viewBox="0 0 24 24"><path d="M5 13 l4 4 l10 -11"/></svg></div><span class="emj">'+t.e+'</span><span class="label"></span><button class="del" aria-label="Delete">✕</button>';
      row.querySelector(".label").textContent=t.t;
      row.addEventListener("click",function(){if(document.body.classList.contains("managing"))return;toggle(t.id,row);});
      row.querySelector(".del").addEventListener("click",function(ev){ev.stopPropagation();deleteTask(t.id);});
      listEl.appendChild(row);
    });
    if(allDone){
      var d=document.createElement("div");d.className="alldone";
      var msg=current==="today"?"All done for today. Nice work.":"Nothing left "+SHORT[current]+". You're on track.";
      d.innerHTML='<div class="big">✅</div><div class="sub">'+msg+'</div>';listEl.appendChild(d);
    }
  }
  function toggle(id,row){
    var s=state[current];var nowDone=!s.done[id];
    if(nowDone)s.done[id]=true;else delete s.done[id];
    if(current==="today")updateStreak();
    save();
    if(nowDone)row.classList.add("done","pop");
    renderProgress();renderCounts();renderAttention();renderStreak();
    setTimeout(renderList,nowDone?260:0);
  }
  function deleteTask(id){var s=state[current];s.tasks=s.tasks.filter(function(t){return t.id!==id;});delete s.done[id];save();render();}
  function addTask(e,t){state[current].tasks.push({id:uid(),e:e,t:t});save();render();}

  function renderProgress(){
    var s=state[current],total=s.tasks.length,done=total-remaining(current);
    document.getElementById("progLabel").textContent=LABELS[current];
    document.getElementById("progNum").textContent=done+" / "+total;
    document.getElementById("barFill").style.width=(total?Math.round(done/total*100):0)+"%";
  }
  function renderCounts(){PERIODS.forEach(function(p){var el=document.getElementById("c-"+p);var r=remaining(p);el.textContent=r;el.classList.toggle("zero",r===0);});}

  function renderAttention(){
    var box=document.getElementById("attention"),listc=document.getElementById("attList"),items=[];
    ["week","month","year"].forEach(function(p){var s=state[p];s.tasks.forEach(function(t){if(!s.done[t.id])items.push({p:p,t:t});});});
    if(items.length===0){box.classList.remove("show");return;}
    items=items.slice(0,4);var lm={week:"Week",month:"Month",year:"Year"};listc.innerHTML="";
    items.forEach(function(it){var row=document.createElement("div");row.className="att-item";
      row.innerHTML='<span class="emj">'+it.t.e+'</span><span style="flex:1">'+esc(it.t.t)+'</span><span class="pill">'+lm[it.p]+'</span>';
      row.addEventListener("click",function(){switchTo(it.p);});listc.appendChild(row);});
    box.classList.add("show");
  }
  function esc(s){return s.replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

  var tabsEl=document.getElementById("tabs"),tabBg=document.getElementById("tabBg");
  var tabBtns=[].slice.call(tabsEl.querySelectorAll(".tab"));
  function moveTabBg(){var a=tabsEl.querySelector(".tab.active");if(!a)return;tabBg.style.width=a.offsetWidth+"px";tabBg.style.transform="translateX("+a.offsetLeft+"px)";}
  function switchTo(p){current=p;tabBtns.forEach(function(b){b.classList.toggle("active",b.dataset.p===p);});moveTabBg();render();window.scrollTo({top:0,behavior:"smooth"});}
  tabBtns.forEach(function(b){b.addEventListener("click",function(){switchTo(b.dataset.p);});});

  var manageBtn=document.getElementById("manageBtn");
  manageBtn.addEventListener("click",function(){var on=document.body.classList.toggle("managing");manageBtn.classList.toggle("on",on);manageBtn.textContent=on?"Done":"✎";});

  var scrim=document.getElementById("scrim"),sheet=document.getElementById("sheet"),chipsEl=document.getElementById("chips"),customInput=document.getElementById("customInput");
  function openSheet(){
    document.getElementById("sheetTitle").textContent="Add to "+SHORT[current];chipsEl.innerHTML="";
    (CHIPS[current]||[]).forEach(function(c){var b=document.createElement("button");b.className="chip";b.textContent=c[0]+"  "+c[1];
      b.addEventListener("click",function(){addTask(c[0],c[1]);closeSheet();});chipsEl.appendChild(b);});
    customInput.value="";scrim.classList.add("show");sheet.classList.add("show");
  }
  function closeSheet(){scrim.classList.remove("show");sheet.classList.remove("show");customInput.blur();}
  document.getElementById("addFab").addEventListener("click",openSheet);
  scrim.addEventListener("click",closeSheet);
  function submitCustom(){var v=customInput.value.trim();if(!v)return;addTask("📝",v);closeSheet();}
  document.getElementById("customAdd").addEventListener("click",submitCustom);
  customInput.addEventListener("keydown",function(e){if(e.key==="Enter")submitCustom();});

  function setHeader(){var d=new Date(),h=d.getHours();
    document.getElementById("greeting").textContent=h<5?"Still up?":h<12?"Good morning":h<17?"Good afternoon":h<21?"Good evening":"Winding down";
    document.getElementById("date").textContent=d.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});}

  /* living background: gentle ambient drift + scroll-driven hue */
  var reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  var baseHue=110,root=document.documentElement;
  function paint(){
    var max=Math.max(1,document.body.scrollHeight-window.innerHeight);
    var frac=Math.min(1,Math.max(0,window.scrollY/max));
    if(!reduce)baseHue=(baseHue+0.05)%360;
    var h1=(baseHue+frac*90)%360,h2=(h1+45)%360;
    root.style.setProperty("--h1",h1.toFixed(1));
    root.style.setProperty("--h2",h2.toFixed(1));
    requestAnimationFrame(paint);
  }

  function refresh(){rollover();setHeader();render();}
  document.addEventListener("visibilitychange",function(){if(!document.hidden)refresh();});

  load();rollover();setHeader();render();
  setTimeout(moveTabBg,0);window.addEventListener("resize",moveTabBg);window.addEventListener("load",moveTabBg);
  requestAnimationFrame(paint);
})();
</script>
</body>
</html>
